<!DOCTYPE html>
<html>
<head>
    <title>Upload</title>
</head>
<body>
    <h2>Upload a Text File</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Analyze</button>
    </form>

        <h3>Results:</h3>
        <p><strong>Extracted Text:</strong> {{ extracted_text }}</p>


</body>
</html>
